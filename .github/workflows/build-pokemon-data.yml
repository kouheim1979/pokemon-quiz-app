name: Build Pokemon Data JSON

on:
  workflow_dispatch:
  push:
    paths:
      - package.json
      - scripts/build-pokemon-data.mjs
      - scripts/en-name-kana-overrides.json
      - .github/workflows/build-pokemon-data.yml

permissions:
  contents: write

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build pokemon-data.json
        run: npm run build:data
      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pokemon-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build full pokemon-data.json"
            git push
          fi
