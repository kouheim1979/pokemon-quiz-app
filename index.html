<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケモン当てクイズ & JSON図鑑</title>
  <style>
    :root{--bg:#eef4ff;--card:#fff;--blue:#2a75bb;--blue2:#174f8a;--yellow:#ffcb05;--yellow2:#d9a800;--red:#ef4444;--text:#1f2937;--muted:#64748b;--border:#dbeafe;--ok:#16a34a;--ng:#dc2626;--shadow:0 18px 40px rgba(23,79,138,.16);--radius:22px}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:radial-gradient(circle at top left,rgba(255,203,5,.28),transparent 24%),radial-gradient(circle at top right,rgba(42,117,187,.20),transparent 24%),linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%)}
    .app{width:min(1200px,100%);margin:0 auto;padding:16px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border-radius:30px;padding:26px 22px 22px;box-shadow:var(--shadow);border:3px solid rgba(255,255,255,.18)}.hero:before{content:"";position:absolute;right:-54px;top:-58px;width:190px;height:190px;border-radius:50%;border:22px solid rgba(255,255,255,.16)}.hero h1{margin:0 0 8px;font-size:clamp(30px,6vw,48px);line-height:1.1;text-shadow:0 4px 0 rgba(0,0,0,.15)}.lead{margin:0;color:rgba(255,255,255,.9);line-height:1.7}.heroTop{display:flex;gap:16px;justify-content:space-between;align-items:center;flex-wrap:wrap;position:relative;z-index:1}.chip{display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.24);border-radius:999px;padding:10px 16px;font-weight:900}.ball{width:18px;height:18px;border-radius:50%;background:linear-gradient(180deg,#ff6b6b 0 48%,#111827 48% 54%,#fff 54% 100%);border:2px solid #111827;position:relative}.ball:after{content:"";position:absolute;inset:5px;border-radius:50%;background:#fff;border:2px solid #111827}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}.tab{min-height:48px;border:2px solid rgba(255,255,255,.18);border-radius:16px;background:rgba(255,255,255,.14);color:#fff;padding:12px 18px;font-weight:900;cursor:pointer}.tab.active{background:var(--yellow);color:#1f2937;border-color:var(--yellow2);box-shadow:0 8px 20px rgba(255,203,5,.26)}.view{display:none;margin-top:18px}.view.active{display:block}.grid{display:grid;gap:16px}.quizGrid,.dexGrid{grid-template-columns:1fr}@media(min-width:880px){.quizGrid,.dexGrid{grid-template-columns:340px 1fr}}.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:0 0 12px;font-size:20px}.title small{color:var(--muted);font-size:13px}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{border:1px solid var(--border);background:linear-gradient(180deg,#f8fbff,#eef5ff);border-radius:18px;padding:12px}.stat small{display:block;color:var(--muted);margin-bottom:4px;font-weight:700}.stat strong{font-size:24px;color:var(--blue)}label{display:block;margin:14px 0 7px;font-weight:900;font-size:14px}select,input{width:100%;min-height:48px;border-radius:14px;border:2px solid var(--border);background:#fff;padding:10px 12px;font-size:15px;outline:none}select:focus,input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(42,117,187,.12)}button{min-height:48px;border-radius:16px;border:0;padding:12px 15px;font-size:15px;font-weight:900;cursor:pointer}button:disabled{opacity:.55;cursor:not-allowed}.mainBtn{background:var(--yellow);color:#1f2937;border:2px solid var(--yellow2)}.subBtn{background:var(--blue);color:#fff}.ghostBtn{background:#eef5ff;color:var(--blue);border:1px solid var(--border)}.dangerBtn{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.row{display:grid;gap:10px;margin-top:14px}.two{grid-template-columns:1fr}@media(min-width:520px){.two{grid-template-columns:1fr 1fr}}.board{text-align:center}.qno{display:inline-flex;background:#eff6ff;color:var(--blue);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-weight:900;margin-bottom:14px}.emblem{width:min(280px,76vw);aspect-ratio:1;margin:0 auto 16px;border-radius:36px;background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(238,245,255,.95));border:4px solid #d7e7ff;display:grid;place-items:center;box-shadow:inset 0 0 0 8px rgba(255,203,5,.15),0 18px 30px rgba(23,79,138,.12)}.core{width:160px;height:160px;border-radius:50%;background:linear-gradient(180deg,#ff6b6b 0 47%,#111827 47% 54%,#fff 54% 100%);border:8px solid #111827;display:grid;place-items:center;position:relative;box-shadow:0 12px 26px rgba(0,0,0,.16)}.core:after{content:"";position:absolute;width:70px;height:70px;border-radius:50%;background:#fff;border:8px solid #111827}.letter{position:relative;z-index:1;font-size:48px;font-weight:1000;color:#111827}.masked{font-size:clamp(28px,8vw,48px);font-weight:1000;letter-spacing:.14em;color:var(--blue);margin:6px 0 10px}.badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:10px 0}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:6px 12px;border-radius:999px;color:#fff;font-size:13px;font-weight:900}.hint{background:linear-gradient(180deg,#fffbeb,#fff7d6);border:2px dashed #facc15;border-radius:18px;padding:14px;margin:14px 0;text-align:left}.hint h3{margin:0 0 8px}.hint ol{margin:0;padding-left:20px;line-height:1.85}.choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(min-width:560px){.choices{grid-template-columns:1fr 1fr}}.choice{background:#fff;color:var(--text);border:2px solid var(--border);text-align:left;padding:14px}.choice:hover{background:#f8fbff;border-color:var(--blue)}.choice.correct{border-color:var(--ok);background:#dcfce7;color:#14532d}.choice.wrong{border-color:var(--ng);background:#fee2e2;color:#7f1d1d}.answer{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(min-width:560px){.answer{grid-template-columns:1fr 150px}}.result{display:none;text-align:left;margin-top:16px;padding:16px;border-radius:18px;border:2px solid var(--border);background:#f8fbff}.result.show{display:block}.result.ok{border-color:#86efac;background:#f0fdf4}.result.ng{border-color:#fecaca;background:#fff1f2}.history,.dexList{display:grid;gap:8px;margin-top:10px}.hist{border:1px solid var(--border);border-radius:14px;padding:10px;background:#f8fbff;font-size:14px}.hist.ok{border-color:#bbf7d0;background:#f0fdf4}.hist.ng{border-color:#fecaca;background:#fff1f2}.note{margin-top:10px;color:var(--muted);font-size:13px;line-height:1.7}.hidden{display:none!important}.dexList{max-height:66vh;overflow:auto;padding-right:4px}.dexItem{border:2px solid var(--border);background:linear-gradient(180deg,#fff,#f7fbff);border-radius:18px;padding:12px;text-align:left;cursor:pointer}.dexItem.active{border-color:var(--yellow2);background:linear-gradient(180deg,#fff9dd,#fff4bf)}.symbol{width:44px;height:44px;border-radius:14px;background:linear-gradient(180deg,#ffefab,#ffd54a);border:2px solid #f4bf00;display:grid;place-items:center;font-size:20px;font-weight:1000}.dexHead{display:flex;gap:10px;align-items:center;justify-content:space-between}.panel{display:grid;gap:14px}.dexHero{display:grid;gap:16px}@media(min-width:700px){.dexHero{grid-template-columns:250px 1fr}}.portrait{border-radius:24px;padding:18px;background:linear-gradient(180deg,#f8fbff,#eef5ff);border:1px solid var(--border);display:grid;place-items:center;text-align:center}.pball{width:170px;height:170px;border-radius:50%;background:linear-gradient(180deg,#ff6b6b 0 48%,#111827 48% 54%,#fff 54% 100%);border:8px solid #111827;position:relative;display:grid;place-items:center;margin-bottom:14px}.pball:after{content:"";position:absolute;width:62px;height:62px;border-radius:50%;background:#fff;border:8px solid #111827}.pball span{position:relative;z-index:1;font-size:54px;font-weight:1000;color:#111827}.basic{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}@media(min-width:900px){.basic{grid-template-columns:repeat(4,1fr)}}.box,.diagram{border:1px solid var(--border);background:linear-gradient(180deg,#fff,#f7fbff);border-radius:16px;padding:12px}.box small{display:block;color:var(--muted);font-weight:700;margin-bottom:4px}.box strong{color:var(--blue)}.diagrams{display:grid;gap:12px}@media(min-width:900px){.diagrams{grid-template-columns:1fr 1fr}}.diagram h3{margin:0 0 10px;color:var(--blue2)}.diagram ul{margin:0;padding-left:18px;line-height:1.8}.bars{display:grid;gap:10px}.bar{display:grid;grid-template-columns:96px 1fr 40px;gap:10px;align-items:center;font-size:14px;font-weight:700}.track{height:12px;border-radius:999px;background:#e5eefc;overflow:hidden;border:1px solid #d6e6ff}.fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--yellow),#ffb703)}.empty{border:2px dashed var(--border);border-radius:18px;padding:18px;color:var(--muted);text-align:center;background:#f8fbff}.foot{margin-top:16px;color:var(--muted);font-size:13px;line-height:1.8;text-align:center}.warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:16px;padding:12px;color:#9a3412;margin-top:12px}
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="heroTop"><div><h1>ポケモン当てクイズ<br>＆ JSON図鑑</h1><p class="lead">ポケモン情報は <b>pokemon-data.json</b> から読み込みます。クイズと図鑑を切り替えて遊べます。</p></div><div class="chip"><span class="ball"></span><span id="dataCount">データ読込中</span></div></div>
      <div class="tabs"><button class="tab active" data-view="quiz">クイズモード</button><button class="tab" data-view="dex">図鑑モード</button></div>
    </header>

    <section id="quiz" class="view active"><div class="grid quizGrid">
      <aside class="card"><h2 class="title">バトル設定 <small>遊び方</small></h2><div id="loadWarn"></div><div class="stats"><div class="stat"><small>スコア</small><strong id="score">0</strong></div><div class="stat"><small>最高</small><strong id="best">0</strong></div><div class="stat"><small>連続</small><strong id="streak">0</strong></div><div class="stat"><small>問題</small><strong id="count">0</strong></div></div>
      <label>回答モード</label><select id="mode"><option value="choice">選択肢で答える</option><option value="input">名前を入力する</option></select><label>難易度</label><select id="difficulty"><option value="easy">かんたん</option><option value="normal" selected>ふつう</option><option value="hard">むずかしい</option></select><label>地方</label><select id="region"><option value="all">ぜんぶ</option></select><div class="row"><button class="mainBtn" id="newBtn">新しい問題</button></div><div class="row two"><button class="ghostBtn" id="resetBtn">スコアリセット</button><button class="dangerBtn" id="bestBtn">最高スコア削除</button></div><p class="note" id="diffMsg"></p><h3>直近の結果</h3><div class="history" id="history"><div class="note">まだ結果はありません。</div></div></aside>
      <main class="card board"><div class="qno" id="qno">データを読み込んでいます</div><div class="emblem"><div class="core"><span class="letter" id="letter">?</span></div></div><div class="masked" id="masked">？？？？</div><div class="badges" id="typeBadges"></div><div class="hint"><h3>ヒント</h3><ol id="hints"><li>新しい問題を押すと出題されます。</li></ol></div><div class="row two"><button class="subBtn" id="hintBtn" disabled>追加ヒント</button><button class="ghostBtn" id="answerBtn" disabled>答えを見る</button></div><div class="choices" id="choices"></div><div class="answer hidden" id="inputArea"><input id="input" placeholder="例：ピカチュウ" autocomplete="off"><button class="mainBtn" id="submitBtn">答える</button></div><div class="result" id="result"></div></main>
    </div></section>

    <section id="dex" class="view"><div class="grid dexGrid"><aside class="card"><h2 class="title">図鑑検索 <small>JSONデータ</small></h2><input id="search" type="search" placeholder="名前で検索"><label>地方</label><select id="dexRegion"><option value="all">ぜんぶ</option></select><label>タイプ</label><select id="dexType"><option value="all">ぜんぶ</option></select><p class="note">検索・地方・タイプで絞り込みできます。</p><div class="dexList" id="dexList"></div></aside><main class="card"><h2 class="title">図鑑プロフィール <small>生態・特徴・進化</small></h2><div class="panel" id="dexPanel"><div class="empty">データ読込中です。</div></div></main></div></section>
    <p class="foot">非公式の学習用サンプルです。図鑑説明は公式文の転載ではなく、JSONの構造化データから表示・要約しています。</p>
  </div>

<script>
const typeColor={"ノーマル":"#9ca3af","ほのお":"#ef4444","みず":"#3b82f6","くさ":"#22c55e","でんき":"#f59e0b","こおり":"#06b6d4","かくとう":"#b91c1c","どく":"#a855f7","じめん":"#b45309","ひこう":"#60a5fa","エスパー":"#ec4899","むし":"#65a30d","いわ":"#78716c","ゴースト":"#6d28d9","ドラゴン":"#4338ca","あく":"#374151","はがね":"#64748b","フェアリー":"#f472b6"};
const rules={easy:{label:"かんたん",levels:["easy"],hints:2,type:true,choices:4,base:80,bonus:0,msg:"かんたん：ヒント2個、タイプ表示あり。"},normal:{label:"ふつう",levels:["easy","normal"],hints:1,type:false,choices:4,base:100,bonus:10,msg:"ふつう：1ヒントからスタート。"},hard:{label:"むずかしい",levels:["easy","normal","hard"],hints:1,type:false,choices:6,base:120,bonus:30,msg:"むずかしい：6択で高得点。"}};
let all=[],filteredDex=[],state={cur:null,choices:[],score:0,best:Number(localStorage.getItem("pokemonQuizBestScore")||0),streak:0,count:0,hints:0,answered:false,history:[],dexIndex:0};
const $=id=>document.getElementById(id);const el={score:$("score"),best:$("best"),streak:$("streak"),count:$("count"),mode:$("mode"),difficulty:$("difficulty"),region:$("region"),qno:$("qno"),letter:$("letter"),masked:$("masked"),typeBadges:$("typeBadges"),hints:$("hints"),hintBtn:$("hintBtn"),answerBtn:$("answerBtn"),choices:$("choices"),inputArea:$("inputArea"),input:$("input"),submitBtn:$("submitBtn"),result:$("result"),history:$("history"),search:$("search"),dexRegion:$("dexRegion"),dexType:$("dexType"),dexList:$("dexList"),dexPanel:$("dexPanel"),diffMsg:$("diffMsg")};
function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}function norm(v){return String(v||"").normalize("NFKC").trim().toLowerCase().replace(/\s+/g,"").replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60))}function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}function nameOf(p){return p?.name?.ja||p?.name||"不明"}function enOf(p){return p?.name?.en||p?.slug||""}function badge(t){return `<span class="badge" style="background:${typeColor[t]||"#64748b"}">${esc(t)}</span>`}function rule(){return rules[el.difficulty.value]||rules.normal}
function renderStats(){el.score.textContent=state.score;el.best.textContent=state.best;el.streak.textContent=state.streak;el.count.textContent=state.count}function mask(n){const c=[...n];if(state.hints<=1)return c.map(()=>"？").join("");if(state.hints===2)return c.map((x,i)=>i===0?x:"？").join("");return c.map((x,i)=>i===0||i===c.length-1?x:"？").join("")}function renderTypes(p,show){el.typeBadges.innerHTML=show&&p?p.types.map(badge).join(""):'<span class="badge" style="background:#94a3b8">タイプ：？？？</span>'}function renderHints(){el.hints.innerHTML="";if(!state.cur){el.hints.innerHTML="<li>新しい問題を押すと出題されます。</li>";return}state.cur.hints.slice(0,state.hints).forEach(h=>{const li=document.createElement("li");li.textContent=h;el.hints.appendChild(li)})}
function pool(){const r=rule(),reg=el.region.value;let p=all.filter(x=>r.levels.includes(x.level||"normal"));if(reg!=="all")p=p.filter(x=>x.region===reg);return p.length?p:all}function makeChoices(ans,src,n){return shuffle([ans,...shuffle(src.filter(x=>x.id!==ans.id)).slice(0,n-1)])}function renderChoices(){el.choices.innerHTML="";if(!state.cur||el.mode.value!=="choice")return;state.choices.forEach(c=>{const b=document.createElement("button");b.className="choice";b.textContent=nameOf(c);b.disabled=state.answered;b.onclick=()=>judge(nameOf(c),b);el.choices.appendChild(b)})}
function renderQuestion(){if(!state.cur){el.qno.textContent=all.length?"問題を開始してください":"データ読込中";el.masked.textContent="？？？？";el.letter.textContent="?";renderTypes(null,false);renderHints();el.choices.innerHTML="";return}const r=rule();el.qno.textContent=`第 ${state.count} 問 / ${r.label}`;el.masked.textContent=state.answered?nameOf(state.cur):mask(nameOf(state.cur));el.letter.textContent=state.answered||state.hints>=2?nameOf(state.cur)[0]:"?";renderTypes(state.cur,state.answered||r.type||state.hints>=3);renderHints();renderChoices()}
function start(){if(!all.length)return;const r=rule(),p=pool();state.cur=shuffle(p)[0];state.choices=makeChoices(state.cur,p.length>=r.choices?p:all,r.choices);state.hints=r.hints;state.answered=false;state.count++;el.hintBtn.disabled=false;el.answerBtn.disabled=false;el.input.disabled=false;el.submitBtn.disabled=false;el.input.value="";el.result.className="result";el.result.innerHTML="";el.inputArea.classList.toggle("hidden",el.mode.value!=="input");el.choices.classList.toggle("hidden",el.mode.value!=="choice");renderQuestion();renderStats()}function point(ok){if(!ok)return 0;const r=rule();return Math.max(20,r.base-Math.max(0,state.hints-r.hints)*25+r.bonus)}function correct(v){const p=state.cur,ok=[nameOf(p),enOf(p),p.slug,...(p.aliases||[])].map(norm);return ok.includes(norm(v))}
function colorButtons(btn,ok){[...el.choices.querySelectorAll("button")].forEach(b=>{b.disabled=true;if(b.textContent===nameOf(state.cur))b.classList.add("correct")});if(btn&&!ok)btn.classList.add("wrong")}function showResult(ok,pt){const p=state.cur;el.result.className=`result show ${ok?"ok":"ng"}`;el.result.innerHTML=`<h2>${ok?"正解！":"ざんねん！"}</h2><p>${ok?`やったね！ ${pt}点ゲット。`:"次は図鑑で確認してみよう。"}</p><p>答えは <strong>${esc(nameOf(p))}</strong> です。</p><div class="badges">${p.types.map(badge).join("")}</div><p style="color:#475569;line-height:1.8">${esc(p.region)} / ${esc(p.genus)}<br>${esc(p.description||"")}</p><div class="row two"><button class="mainBtn" id="nextBtn">次の問題へ</button><button class="ghostBtn" id="dexJump">図鑑で見る</button></div>`;$("nextBtn").onclick=start;$("dexJump").onclick=()=>{switchView("dex");selectDex(p.id)}}
function judge(v,btn){if(!state.cur||state.answered)return;const ok=correct(v),pt=point(ok),r=rule();state.answered=true;state.score+=pt;state.streak=ok?state.streak+1:0;if(state.score>state.best){state.best=state.score;localStorage.setItem("pokemonQuizBestScore",String(state.best))}state.history.unshift({ok,name:nameOf(state.cur),pt,h:state.hints,d:r.label});el.hintBtn.disabled=true;el.answerBtn.disabled=true;el.input.disabled=true;el.submitBtn.disabled=true;colorButtons(btn,ok);showResult(ok,pt);renderStats();renderQuestion();renderHistory()}
function renderHistory(){el.history.innerHTML="";if(!state.history.length){el.history.innerHTML='<div class="note">まだ結果はありません。</div>';return}state.history.slice(0,6).forEach(x=>{el.history.innerHTML+=`<div class="hist ${x.ok?"ok":"ng"}"><strong>${x.ok?"正解":"不正解"}</strong><br>答え：${esc(x.name)}<br><span style="color:#64748b">${x.pt}点 / ヒント${x.h}個 / ${esc(x.d)}</span></div>`})}
function fillFilters(){const regs=[...new Set(all.map(p=>p.region).filter(Boolean))];const types=[...new Set(all.flatMap(p=>p.types||[]))];for(const s of [el.region,el.dexRegion]){const cur=s.value;s.innerHTML='<option value="all">ぜんぶ</option>'+regs.map(r=>`<option>${esc(r)}</option>`).join("");s.value=cur||"all"}el.dexType.innerHTML='<option value="all">ぜんぶ</option>'+types.map(t=>`<option>${esc(t)}</option>`).join("")}
function dexFiltered(){const q=norm(el.search.value),reg=el.dexRegion.value,type=el.dexType.value;return all.filter(p=>(!q||norm(nameOf(p)).includes(q)||norm(enOf(p)).includes(q)||norm(p.slug).includes(q))&&(reg==="all"||p.region===reg)&&(type==="all"||p.types.includes(type)))}function renderDex(){filteredDex=dexFiltered();el.dexList.innerHTML="";if(!filteredDex.length){el.dexList.innerHTML='<div class="empty">見つかりません。</div>';el.dexPanel.innerHTML='<div class="empty">表示できるポケモンがありません。</div>';return}if(!filteredDex[state.dexIndex])state.dexIndex=0;filteredDex.forEach((p,i)=>{const b=document.createElement("button");b.className=`dexItem ${i===state.dexIndex?"active":""}`;b.innerHTML=`<div class="dexHead"><div style="display:flex;gap:10px;align-items:center"><div class="symbol">${esc(nameOf(p)[0])}</div><div><div style="font-weight:900">#${p.id} ${esc(nameOf(p))}</div><div style="color:#64748b;font-size:12px;font-weight:800">${esc(p.region)} / ${esc(p.genus)}</div></div></div></div><div class="badges" style="justify-content:flex-start">${p.types.map(badge).join("")}</div>`;b.onclick=()=>{state.dexIndex=i;renderDex()};el.dexList.appendChild(b)});renderDexPanel(filteredDex[state.dexIndex])}
function bars(s={}){return [["power","ちから"],["speed","すばやさ"],["brain","かしこさ"],["friend","なつきやすさ"],["rare","レア感"]].map(([k,l])=>`<div class="bar"><span>${l}</span><div class="track"><div class="fill" style="width:${(s[k]||0)*20}%"></div></div><strong>${s[k]||0}/5</strong></div>`).join("")}function renderDexPanel(p){if(!p)return;el.dexPanel.innerHTML=`<div class="dexHero"><div class="portrait"><div class="pball"><span>${esc(nameOf(p)[0])}</span></div><div style="font-size:26px;font-weight:1000;color:#174f8a">#${p.id} ${esc(nameOf(p))}</div><div style="margin-top:6px;color:#64748b;font-weight:700">${esc(enOf(p))}</div><div class="badges">${p.types.map(badge).join("")}</div><div class="row" style="width:100%"><button class="mainBtn" id="challenge">このポケモンでクイズ</button></div></div><div><div class="basic"><div class="box"><small>高さ</small><strong>${esc(p.heightM)}m</strong></div><div class="box"><small>重さ</small><strong>${esc(p.weightKg)}kg</strong></div><div class="box"><small>地方</small><strong>${esc(p.region)}</strong></div><div class="box"><small>分類</small><strong>${esc(p.genus)}</strong></div></div><div class="diagram" style="margin-top:12px"><h3>図鑑風サマリー</h3><p style="line-height:1.9">${esc(p.description||"")}</p></div><div class="diagram" style="margin-top:12px"><h3>プロフィールバー</h3><div class="bars">${bars(p.stats)}</div></div></div></div><div class="diagrams"><div class="diagram"><h3>生態・くらし</h3><ul><li><b>食性：</b>${esc(p.diet||"不明")}</li><li><b>生息：</b>${esc(p.habitat||"不明")}</li><li><b>活動：</b>${esc(p.activity||"不明")}</li><li><b>形：</b>${esc(p.shape||"不明")}</li><li><b>色：</b>${esc(p.color||"不明")}</li></ul></div><div class="diagram"><h3>進化の流れ</h3><p>${esc(p.evolution||"不明")}</p></div><div class="diagram"><h3>特徴メモ</h3><ul>${(p.features||[]).map(f=>`<li>${esc(f)}</li>`).join("")}</ul></div><div class="diagram"><h3>クイズ用ヒント</h3><ul>${(p.hints||[]).map(h=>`<li>${esc(h)}</li>`).join("")}</ul></div></div>`;$("challenge").onclick=()=>{switchView("quiz");forceQuestion(p.id)}}function selectDex(id){const i=filteredDex.findIndex(p=>p.id===id);if(i>=0){state.dexIndex=i;renderDex()}else{el.search.value="";el.dexRegion.value="all";el.dexType.value="all";renderDex();selectDex(id)}}function forceQuestion(id){const p=all.find(x=>x.id===id);if(!p)return;const r=rule();state.cur=p;state.choices=makeChoices(p,pool().length>=r.choices?pool():all,r.choices);state.hints=r.hints;state.answered=false;state.count++;el.hintBtn.disabled=false;el.answerBtn.disabled=false;el.input.disabled=false;el.submitBtn.disabled=false;el.input.value="";el.result.className="result";el.result.innerHTML="";renderQuestion();renderStats()}
function switchView(id){document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.view===id));document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id===id))}
async function loadData(){try{const res=await fetch("pokemon-data.json",{cache:"no-store"});if(!res.ok)throw new Error(`${res.status}`);const data=await res.json();all=data.pokemon||[];$("dataCount").textContent=`${all.length}件読込 / ${data.meta?.mode||"json"}`;if(data.meta?.mode==="sample")$("loadWarn").innerHTML='<div class="warn">現在はサンプルJSONです。Actionsで全件生成すると全ポケモン版になります。</div>';fillFilters();renderDex();el.qno.textContent="問題を開始してください"}catch(e){$("dataCount").textContent="読込失敗";$("loadWarn").innerHTML=`<div class="warn">pokemon-data.jsonを読み込めません。GitHub Pagesまたはローカルサーバーで開いてください。<br>${esc(e.message)}</div>`;el.qno.textContent="データ読込失敗"}renderStats();renderQuestion();renderHistory()}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>switchView(b.dataset.view));$("newBtn").onclick=start;el.hintBtn.onclick=()=>{if(state.cur&&!state.answered){state.hints=Math.min(state.hints+1,state.cur.hints.length);if(state.hints>=state.cur.hints.length)el.hintBtn.disabled=true;renderQuestion()}};el.answerBtn.onclick=()=>judge("__show__",null);el.submitBtn.onclick=()=>{if(!el.input.value.trim()){el.input.focus();return}judge(el.input.value,null)};el.input.onkeydown=e=>{if(e.key==="Enter")el.submitBtn.click()};el.mode.onchange=()=>{el.inputArea.classList.toggle("hidden",el.mode.value!=="input");el.choices.classList.toggle("hidden",el.mode.value!=="choice");renderChoices()};el.difficulty.onchange=()=>{el.diffMsg.textContent=rule().msg};$("resetBtn").onclick=()=>{state.score=0;state.streak=0;state.count=0;state.history=[];renderStats();renderHistory();el.result.className="result";el.qno.textContent="スコアをリセットしました"};$("bestBtn").onclick=()=>{state.best=0;localStorage.removeItem("pokemonQuizBestScore");renderStats()};[el.search,el.dexRegion,el.dexType].forEach(x=>x.addEventListener(x.tagName==="INPUT"?"input":"change",()=>{state.dexIndex=0;renderDex()}));el.diffMsg.textContent=rule().msg;loadData();
</script>
