<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ポケモン当てクイズ</title>
  <style>
    :root{--bg:#f6f8ff;--card:#fff;--main:#ffcb05;--sub:#2a75bb;--text:#1f2937;--muted:#6b7280;--ok:#16a34a;--ng:#ef4444;--border:#dbe4ff;--shadow:0 16px 40px rgba(42,117,187,.18);--radius:22px}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,rgba(255,203,5,.24),transparent 34%),radial-gradient(circle at bottom right,rgba(42,117,187,.18),transparent 32%),var(--bg);color:var(--text)}.app{width:min(980px,100%);margin:0 auto;padding:18px}header{background:linear-gradient(135deg,var(--sub),#174f8a);color:white;border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);position:relative;overflow:hidden}header:after{content:"";position:absolute;width:160px;height:160px;right:-52px;top:-52px;border-radius:50%;border:18px solid rgba(255,255,255,.12)}h1{margin:0 0 8px;font-size:clamp(28px,6vw,44px);letter-spacing:.03em}.lead{margin:0;color:rgba(255,255,255,.88);line-height:1.65}.grid{display:grid;grid-template-columns:1fr;gap:16px;margin-top:16px}@media(min-width:820px){.grid{grid-template-columns:330px 1fr;align-items:start}}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:#f8fbff;border:1px solid var(--border);border-radius:16px;padding:12px}.stat small{display:block;color:var(--muted);margin-bottom:4px}.stat strong{font-size:24px;color:var(--sub)}label{display:block;font-weight:900;margin:14px 0 7px}select,input[type=text]{width:100%;min-height:50px;border:2px solid var(--border);border-radius:14px;background:white;padding:10px 12px;font-size:16px;outline:none}select:focus,input[type=text]:focus{border-color:var(--sub);box-shadow:0 0 0 4px rgba(42,117,187,.12)}button{min-height:50px;border:0;border-radius:16px;padding:13px 15px;font-size:16px;font-weight:900;cursor:pointer;transition:transform .08s ease,opacity .15s ease}button:active{transform:translateY(1px) scale(.99)}button:disabled{opacity:.52;cursor:not-allowed}.btn-main{background:var(--main);color:#2d2d2d;border:2px solid #e0ae00}.btn-sub{background:var(--sub);color:white}.btn-ghost{background:#eef5ff;color:var(--sub);border:1px solid var(--border)}.btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}.btn-row{display:grid;gap:10px;margin-top:14px}@media(min-width:520px){.btn-row.two{grid-template-columns:1fr 1fr}}.question-area{text-align:center}.question-no{display:inline-flex;align-items:center;justify-content:center;background:#eff6ff;color:var(--sub);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-weight:900;margin-bottom:14px}.mystery{width:min(270px,78vw);aspect-ratio:1;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle at 50% 42%,#fff 0 18%,transparent 19%),linear-gradient(180deg,#ff5f5f 0 48%,#202124 49% 52%,#fff 53% 100%);border:8px solid #202124;box-shadow:inset 0 0 0 8px rgba(255,255,255,.35),0 20px 40px rgba(0,0,0,.14);display:grid;place-items:center}.mystery:after{content:"?";width:88px;height:88px;border-radius:50%;background:white;border:8px solid #202124;display:grid;place-items:center;font-size:56px;font-weight:1000;color:#202124}.masked-name{margin:6px 0 10px;color:var(--sub);font-size:clamp(28px,8vw,48px);font-weight:1000;letter-spacing:.12em}.badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:12px 0}.badge{display:inline-flex;align-items:center;justify-content:center;min-height:34px;padding:6px 12px;border-radius:999px;color:white;font-size:14px;font-weight:900}.type-ノーマル{background:#9ca3af}.type-ほのお{background:#ef4444}.type-みず{background:#3b82f6}.type-くさ{background:#22c55e}.type-でんき{background:#f59e0b}.type-こおり{background:#06b6d4}.type-かくとう{background:#b91c1c}.type-どく{background:#a855f7}.type-じめん{background:#b45309}.type-ひこう{background:#60a5fa}.type-エスパー{background:#ec4899}.type-むし{background:#65a30d}.type-いわ{background:#78716c}.type-ゴースト{background:#6d28d9}.type-ドラゴン{background:#4338ca}.type-あく{background:#374151}.type-はがね{background:#64748b}.type-フェアリー{background:#f472b6}.hint-box{text-align:left;background:#fffbeb;border:2px dashed #facc15;border-radius:18px;padding:14px;margin:14px 0}.hint-box h2{margin:0 0 8px;font-size:18px}.hint-list{margin:0;padding-left:20px;line-height:1.85}.choices{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(min-width:560px){.choices{grid-template-columns:1fr 1fr}}.choice{background:white;color:var(--text);border:2px solid var(--border);text-align:left;padding:15px}.choice:hover{border-color:var(--sub);background:#f8fbff}.choice.correct{border-color:var(--ok);background:#dcfce7;color:#14532d}.choice.wrong{border-color:var(--ng);background:#fee2e2;color:#7f1d1d}.answer-row{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}@media(min-width:560px){.answer-row{grid-template-columns:1fr 150px}}.result{display:none;text-align:left;margin-top:16px;padding:16px;border-radius:18px;border:2px solid var(--border);background:#f8fbff}.result.show{display:block}.result.ok{border-color:#86efac;background:#f0fdf4}.result.ng{border-color:#fecaca;background:#fff1f2}.result h2{margin:0 0 8px;font-size:24px}.pokemon-name{color:var(--sub);font-weight:1000}.mini{color:var(--muted);font-size:14px;line-height:1.65}.history{display:grid;gap:8px;margin-top:10px}.history-item{border:1px solid var(--border);border-radius:14px;padding:10px;background:#f8fbff;font-size:14px}.history-item.ok{border-color:#bbf7d0;background:#f0fdf4}.history-item.ng{border-color:#fecaca;background:#fff1f2}.footer-note{margin-top:16px;color:var(--muted);font-size:13px;line-height:1.7;text-align:center}.hidden{display:none!important}.shake{animation:shake .28s linear}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  </style>
</head>
<body>
  <div class="app">
    <header><h1>ポケモン当てクイズ</h1><p class="lead">ヒントを見て、どのポケモンか当てよう。4択でも、名前入力でも遊べます。</p></header>
    <main class="grid">
      <section class="card">
        <div class="stats">
          <div class="stat"><small>スコア</small><strong id="score">0</strong></div><div class="stat"><small>最高スコア</small><strong id="bestScore">0</strong></div><div class="stat"><small>連続正解</small><strong id="streak">0</strong></div><div class="stat"><small>問題数</small><strong id="count">0</strong></div>
        </div>
        <label for="mode">モード</label><select id="mode"><option value="choice">4択モード</option><option value="input">入力モード</option></select>
        <label for="difficulty">難易度</label><select id="difficulty"><option value="all">ぜんぶ</option><option value="easy">やさしい</option><option value="normal">ふつう</option><option value="hard">むずかしい</option></select>
        <label for="region">地方</label><select id="region"><option value="all">ぜんぶ</option><option value="カントー">カントー</option><option value="ジョウト">ジョウト</option><option value="ホウエン">ホウエン</option><option value="シンオウ">シンオウ</option><option value="イッシュ">イッシュ</option><option value="カロス">カロス</option><option value="アローラ">アローラ</option><option value="ガラル">ガラル</option><option value="パルデア">パルデア</option></select>
        <div class="btn-row"><button class="btn-main" id="newQuestionBtn">新しい問題</button></div>
        <div class="btn-row two"><button class="btn-ghost" id="resetScoreBtn">スコアリセット</button><button class="btn-danger" id="resetBestBtn">最高スコア削除</button></div>
        <h2 style="margin:18px 0 8px;font-size:18px;">直近の結果</h2><div id="history" class="history"><div class="mini">まだ結果はありません。</div></div>
      </section>
      <section class="card question-area">
        <div class="question-no" id="questionNo">問題を開始してください</div><div class="mystery" aria-hidden="true"></div><div class="masked-name" id="maskedName">？？？？</div><div class="badges" id="typeBadges"></div>
        <div class="hint-box"><h2>ヒント</h2><ol class="hint-list" id="hintList"><li>「新しい問題」を押すとヒントが出ます。</li></ol></div>
        <div class="btn-row two"><button class="btn-sub" id="hintBtn" disabled>ヒントを見る</button><button class="btn-ghost" id="showAnswerBtn" disabled>答えを見る</button></div>
        <div id="choiceArea" class="choices"></div>
        <div id="inputArea" class="answer-row hidden"><input id="answerInput" type="text" placeholder="ポケモン名を入力 例：ピカチュウ" autocomplete="off" /><button class="btn-main" id="answerBtn">答える</button></div>
        <div id="result" class="result"></div>
      </section>
    </main>
    <p class="footer-note">このアプリは学習・クイズ用の非公式ファン制作サンプルです。公式画像・音声・外部データは使用していません。</p>
  </div>
  <script>
    const POKEMON_DATA=[

      {name:"エースバーン",aliases:["えーすばーん","cinderace"],region:"ガラル",difficulty:"normal",types:["ほのお"],hints:["サッカー選手のような動き。","ヒバニーの最終進化。","炎のボールを蹴るイメージがある。"],note:"スピード感のあるほのおタイプです。"},
      {name:"ザシアン",aliases:["ざしあん","zacian"],region:"ガラル",difficulty:"hard",types:["フェアリー"],hints:["剣をくわえた伝説ポケモン。","ガラル地方と関係が深い。","対になる存在としてザマゼンタがいる。"],note:"剣のイメージが非常に強い伝説ポケモンです。"},
      {name:"ニャオハ",aliases:["にゃおは","sprigatito"],region:"パルデア",difficulty:"easy",types:["くさ"],hints:["ネコのような姿。","パルデア地方のくさタイプ御三家。","緑色で、かわいらしい表情が特徴。"],note:"近年の御三家の中でも人気が高いポケモンです。"},
      {name:"ホゲータ",aliases:["ほげーた","fuecoco"],region:"パルデア",difficulty:"easy",types:["ほのお"],hints:["ワニのような姿。","パルデア地方のほのおタイプ御三家。","のんびりした表情が特徴。"],note:"愛嬌のある表情で人気があります。"},
      {name:"クワッス",aliases:["くわっす","quaxly"],region:"パルデア",difficulty:"easy",types:["みず"],hints:["アヒルのような姿。","頭の青い毛が特徴。","パルデア地方のみずタイプ御三家。"],note:"きちんとした雰囲気のあるポケモンです。"},
      {name:"コライドン",aliases:["こらいどん","koraidon"],region:"パルデア",difficulty:"hard",types:["かくとう","ドラゴン"],hints:["古代の雰囲気がある伝説ポケモン。","赤い体が特徴。","ミライドンと対になるイメージがある。"],note:"力強く野性的な印象の伝説ポケモンです。"},
      {name:"ミライドン",aliases:["みらいどん","miraidon"],region:"パルデア",difficulty:"hard",types:["でんき","ドラゴン"],hints:["未来的な雰囲気がある伝説ポケモン。","紫色で機械的なデザイン。","コライドンと対になるイメージがある。"],note:"近未来的なデザインが特徴の伝説ポケモンです。"}
    ];
    const state={current:null,choices:[],score:0,bestScore:Number(localStorage.getItem("pokemonQuizBestScore")||0),streak:0,count:0,hintOpenCount:0,answered:false,history:[]};
    const els={score:document.getElementById("score"),bestScore:document.getElementById("bestScore"),streak:document.getElementById("streak"),count:document.getElementById("count"),mode:document.getElementById("mode"),difficulty:document.getElementById("difficulty"),region:document.getElementById("region"),newQuestionBtn:document.getElementById("newQuestionBtn"),resetScoreBtn:document.getElementById("resetScoreBtn"),resetBestBtn:document.getElementById("resetBestBtn"),questionNo:document.getElementById("questionNo"),maskedName:document.getElementById("maskedName"),typeBadges:document.getElementById("typeBadges"),hintList:document.getElementById("hintList"),hintBtn:document.getElementById("hintBtn"),showAnswerBtn:document.getElementById("showAnswerBtn"),choiceArea:document.getElementById("choiceArea"),inputArea:document.getElementById("inputArea"),answerInput:document.getElementById("answerInput"),answerBtn:document.getElementById("answerBtn"),result:document.getElementById("result"),history:document.getElementById("history")};
    function normalizeText(value){return String(value||"").normalize("NFKC").trim().toLowerCase().replace(/\s+/g,"").replace(/[ァ-ン]/g,char=>String.fromCharCode(char.charCodeAt(0)-0x60))}
    function shuffle(array){const copied=[...array];for(let i=copied.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copied[i],copied[j]]=[copied[j],copied[i]]}return copied}
    function escapeHtml(value){return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function getFilteredPokemon(){const difficulty=els.difficulty.value,region=els.region.value;let list=POKEMON_DATA.filter(p=>{const d=difficulty==="all"||p.difficulty===difficulty;const r=region==="all"||p.region===region;return d&&r});if(list.length<4&&els.mode.value==="choice")list=POKEMON_DATA.filter(p=>region==="all"||p.region===region);if(list.length<4&&els.mode.value==="choice")list=[...POKEMON_DATA];return list.length>0?list:[...POKEMON_DATA]}
    function makeMaskedName(name){const chars=[...name];if(state.hintOpenCount<=1)return chars.map(()=>"？").join("");if(state.hintOpenCount===2)return chars.map((c,i)=>i===0?c:"？").join("");return chars.map((c,i)=>i===0||i===chars.length-1?c:"？").join("")}
    function makeChoices(answer,sourceList){const wrongs=shuffle(sourceList.filter(p=>p.name!==answer.name)).slice(0,3);return shuffle([answer,...wrongs])}
    function renderStats(){els.score.textContent=state.score;els.bestScore.textContent=state.bestScore;els.streak.textContent=state.streak;els.count.textContent=state.count}
    function renderMode(){if(els.mode.value==="choice"){els.choiceArea.classList.remove("hidden");els.inputArea.classList.add("hidden")}else{els.choiceArea.classList.add("hidden");els.inputArea.classList.remove("hidden")}}
    function renderTypeBadges(pokemon,reveal){els.typeBadges.innerHTML="";if(!pokemon||!reveal){const span=document.createElement("span");span.className="badge";span.style.background="#9ca3af";span.textContent="タイプ：？？？";els.typeBadges.appendChild(span);return}pokemon.types.forEach(type=>{const span=document.createElement("span");span.className=`badge type-${type}`;span.textContent=type;els.typeBadges.appendChild(span)})}
    function renderHints(){els.hintList.innerHTML="";if(!state.current){const li=document.createElement("li");li.textContent="「新しい問題」を押すとヒントが出ます。";els.hintList.appendChild(li);return}const openHints=state.current.hints.slice(0,state.hintOpenCount);if(openHints.length===0){const li=document.createElement("li");li.textContent="まだヒントは開いていません。";els.hintList.appendChild(li);return}openHints.forEach(hint=>{const li=document.createElement("li");li.textContent=hint;els.hintList.appendChild(li)})}
    function renderChoices(){els.choiceArea.innerHTML="";if(!state.current||els.mode.value!=="choice")return;state.choices.forEach(choice=>{const button=document.createElement("button");button.className="choice";button.textContent=choice.name;button.disabled=state.answered;button.addEventListener("click",()=>judge(choice.name,button));els.choiceArea.appendChild(button)})}
    function renderResult(){els.result.className="result";els.result.innerHTML=""}
    function renderHistory(){els.history.innerHTML="";if(state.history.length===0){const div=document.createElement("div");div.className="mini";div.textContent="まだ結果はありません。";els.history.appendChild(div);return}state.history.slice(0,6).forEach(item=>{const div=document.createElement("div");div.className=`history-item ${item.ok?"ok":"ng"}`;div.innerHTML=`<strong>${item.ok?"正解":"不正解"}</strong><br>答え：${escapeHtml(item.name)}<br><span class="mini">得点：${item.point}点 / ヒント：${item.hints}個</span>`;els.history.appendChild(div)})}
    function renderQuestion(){if(!state.current){els.questionNo.textContent="問題を開始してください";els.maskedName.textContent="？？？？";renderTypeBadges(null,false);renderHints();renderChoices();renderResult();return}els.questionNo.textContent=`第 ${state.count} 問`;els.maskedName.textContent=makeMaskedName(state.current.name);renderTypeBadges(state.current,state.hintOpenCount>=2||state.answered);renderHints();renderChoices()}
    function startQuestion(){const sourceList=getFilteredPokemon();state.current=shuffle(sourceList)[0];state.choices=makeChoices(state.current,sourceList.length>=4?sourceList:POKEMON_DATA);state.hintOpenCount=1;state.answered=false;state.count+=1;els.hintBtn.disabled=false;els.showAnswerBtn.disabled=false;els.answerInput.value="";els.answerInput.disabled=false;els.answerBtn.disabled=false;renderMode();renderResult();renderQuestion();renderStats();if(els.mode.value==="input")setTimeout(()=>els.answerInput.focus(),50)}
    function openHint(){if(!state.current||state.answered)return;if(state.hintOpenCount<state.current.hints.length)state.hintOpenCount+=1;if(state.hintOpenCount>=state.current.hints.length)els.hintBtn.disabled=true;renderQuestion()}
    function getPoint(ok){if(!ok)return 0;if(state.hintOpenCount<=1)return 100;if(state.hintOpenCount===2)return 70;return 40}
    function isCorrectAnswer(inputName){const answer=state.current;const normalizedInput=normalizeText(inputName);const acceptable=[answer.name,...answer.aliases].map(normalizeText);return acceptable.includes(normalizedInput)}
    function judge(inputName,clickedButton){if(!state.current||state.answered)return;const ok=isCorrectAnswer(inputName);const point=getPoint(ok);state.answered=true;state.score+=point;state.streak=ok?state.streak+1:0;if(state.score>state.bestScore){state.bestScore=state.score;localStorage.setItem("pokemonQuizBestScore",String(state.bestScore))}state.history.unshift({ok,name:state.current.name,point,hints:state.hintOpenCount});els.hintBtn.disabled=true;els.showAnswerBtn.disabled=true;els.answerInput.disabled=true;els.answerBtn.disabled=true;updateChoiceButtonColors(clickedButton,ok);showResult(ok,point);renderTypeBadges(state.current,true);els.maskedName.textContent=state.current.name;renderStats();renderHistory()}
    function updateChoiceButtonColors(clickedButton,ok){const buttons=els.choiceArea.querySelectorAll("button.choice");buttons.forEach(button=>{button.disabled=true;if(state.current&&button.textContent===state.current.name)button.classList.add("correct")});if(clickedButton&&!ok)clickedButton.classList.add("wrong")}
    function showResult(ok,point){els.result.className=`result show ${ok?"ok":"ng"}`;const title=ok?"正解！":"ざんねん！";const message=ok?`すごい！ ${point}点ゲットです。`:"次は当てられるかも。ヒントをよく見てみよう。";els.result.innerHTML=`<h2>${title}</h2><p>${message}</p><p>答えは <span class="pokemon-name">${escapeHtml(state.current.name)}</span> です。</p><div class="badges">${state.current.types.map(type=>`<span class="badge type-${escapeHtml(type)}">${escapeHtml(type)}</span>`).join("")}</div><p class="mini">地方：${escapeHtml(state.current.region)}<br>${escapeHtml(state.current.note)}</p><div class="btn-row"><button class="btn-main" id="nextFromResultBtn">次の問題へ</button></div>`;document.getElementById("nextFromResultBtn").addEventListener("click",startQuestion)}
    function submitInputAnswer(){if(!state.current||state.answered)return;const value=els.answerInput.value.trim();if(!value){els.answerInput.classList.remove("shake");void els.answerInput.offsetWidth;els.answerInput.classList.add("shake");els.answerInput.focus();return}judge(value,null)}
    function showAnswer(){if(!state.current||state.answered)return;judge("__show_answer__",null)}
    function resetScore(){state.score=0;state.streak=0;state.count=0;state.history=[];renderStats();renderHistory();renderResult();els.questionNo.textContent="スコアをリセットしました"}
    function resetBestScore(){state.bestScore=0;localStorage.removeItem("pokemonQuizBestScore");renderStats();els.questionNo.textContent="最高スコアを削除しました"}
    els.newQuestionBtn.addEventListener("click",startQuestion);els.hintBtn.addEventListener("click",openHint);els.showAnswerBtn.addEventListener("click",showAnswer);els.answerBtn.addEventListener("click",submitInputAnswer);els.answerInput.addEventListener("keydown",event=>{if(event.key==="Enter")submitInputAnswer()});els.mode.addEventListener("change",()=>{renderMode();if(state.current&&!state.answered)renderQuestion()});els.resetScoreBtn.addEventListener("click",resetScore);els.resetBestBtn.addEventListener("click",resetBestScore);renderStats();renderMode();renderQuestion();renderHistory();
  </script>
</body>
</html>
